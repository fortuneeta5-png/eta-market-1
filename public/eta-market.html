<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETA MARKET — Le e-commerce n°1 à Brazzaville</title>
<meta name="description" content="ETA MARKET — Téléphones, mode et maison livrés à Brazzaville. Paiement MTN MoMo et Airtel Money.">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --red:#E63946;
    --red-dark:#B4222D;
    --black:#1D1D1D;
    --white:#FFFFFF;
    --yellow:#FCA311;
    --line:rgba(255,255,255,0.1);
    --line-dark:rgba(29,29,29,0.1);
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--white);
    color:var(--black);
    font-family:'Poppins', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,.mont{ font-family:'Montserrat', sans-serif; font-weight:800; letter-spacing:-0.01em; }
  a{ color:inherit; text-decoration:none; }
  img{ display:block; max-width:100%; }
  ::selection{ background:var(--red); color:#fff; }

  .btn{
    position:relative; overflow:hidden; border:none; cursor:pointer;
    border-radius:100px; font-family:'Poppins',sans-serif; font-weight:600;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .btn::after{
    content:''; position:absolute; top:0; left:-120%; width:60%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
    transform:skewX(-20deg); transition:left .5s ease;
  }
  .btn:hover::after{ left:130%; }
  .btn-primary{
    background:linear-gradient(135deg, var(--red), var(--red-dark));
    color:#fff; padding:15px 30px; font-size:0.95rem;
    box-shadow:0 8px 20px rgba(230,57,70,0.35);
  }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 14px 28px rgba(230,57,70,0.45); }
  .btn-dark{
    background:var(--black); color:#fff; padding:12px 22px; font-size:0.88rem;
  }
  .btn-dark:hover{ background:var(--red); transform:translateY(-2px); }

  .topbar{ background:var(--black); color:#fff; text-align:center; font-size:0.76rem; padding:8px 12px; letter-spacing:0.03em; }
  .topbar b{ color:var(--yellow); }

  header{ position:sticky; top:0; z-index:60; background:#fff; border-bottom:1px solid var(--line-dark); }
  .header-inner{ max-width:1240px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
  .logo{ font-size:1.5rem; font-weight:900; font-family:'Montserrat',sans-serif; white-space:nowrap; }
  .logo span{ color:var(--red); }
  nav.catnav{ display:flex; gap:26px; font-weight:600; font-size:0.9rem; }
  nav.catnav a{ opacity:0.75; transition:opacity .15s ease, color .15s ease; }
  nav.catnav a:hover{ opacity:1; color:var(--red); }
  @media(max-width:900px){ nav.catnav{ display:none; } }
  .header-actions{ display:flex; align-items:center; gap:14px; }
  .cart-btn{
    background:var(--black); color:#fff; border:none; padding:10px 18px; border-radius:100px;
    font-weight:600; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:8px;
    transition:background .15s ease, transform .15s ease;
  }
  .cart-btn:hover{ background:var(--red); transform:translateY(-1px); }
  .cart-count{ background:var(--yellow); color:var(--black); border-radius:100px; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:800; padding:0 5px;}

  .hero{
    position:relative; background:linear-gradient(125deg, var(--red) 0%, var(--red-dark) 45%, var(--black) 100%);
    color:#fff; overflow:hidden;
  }
  .hero::before{
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(circle at 85% 20%, rgba(252,163,17,0.35), transparent 40%),
      radial-gradient(circle at 10% 90%, rgba(255,255,255,0.12), transparent 45%);
