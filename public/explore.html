<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Découvrir les boutiques — ETA MARKET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#E63946; --red-dark:#B4222D; --black:#1D1D1D; --white:#FFFFFF; --yellow:#FCA311;
    --line:rgba(29,29,29,0.1);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:#FAFAFA; color:var(--black); font-family:'Poppins',sans-serif; min-height:100vh; }
  h1,h2,h3{ font-family:'Montserrat',sans-serif; font-weight:800; }
  a{ color:inherit; text-decoration:none; }

  header{ background:var(--black); color:#fff; padding:18px 24px; text-align:center; }
  .logo{ font-size:1.3rem; font-weight:900; }
  .logo span{ color:var(--red); }

  .hero{ background:linear-gradient(125deg, var(--red), var(--red-dark)); color:#fff; padding:44px 24px; text-align:center; }
  .hero h1{ font-size:1.8rem; margin-bottom:10px; }
  .hero p{ opacity:0.9; font-size:0.95rem; }

  .wrap{ max-width:1000px; margin:0 auto; padding:30px 20px 60px; }
  .section-title{ font-size:1.1rem; margin:24px 0 14px; display:flex; align-items:center; gap:8px; }
  .badge-top{ background:var(--yellow); color:var(--black); font-size:0.65rem; font-weight:800; padding:3px 10px; border-radius:100px; text-transform:uppercase; }

  .store-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
  .store-card{
    background:#fff; border-radius:16px; overflow:hidden; border:1px solid var(--line);
    transition:transform .2s ease; position:relative;
  }
  .store-card:hover{ transform:translateY(-4px); }
  .store-card.top{ border:2px solid var(--yellow); box-shadow:0 8px 24px rgba(252,163,17,0.2); }
  .store-top{ height:70px; }
  .store-body{ padding:16px; }
  .store-body h3{ font-size:1rem; margin-bottom:4px; }
  .store-body p{ font-size:0.8rem; opacity:0.6; line-height:1.4; margin-bottom:10px; min-height:2.2em; }
  .store-rating{ font-size:0.8rem; color:var(--yellow); font-weight:700; }
  .store-rating .count{ color:var(--black); opacity:0.5; font-weight:400; }
  .rank-tag{ position:absolute; top:10px; right:10px; background:var(--yellow); color:var(--black); font-size:0.62rem; font-weight:800; padding:4px 8px; border-radius:100px; }

  .empty{ text-align:center; padding:60px 20px; opacity:0.5; }
  .cta-vendor{ text-align:center; margin-top:50px; padding:30px; background:var(--black); border-radius:18px; color:#fff; }
  .cta-vendor h3{ margin-bottom:10px; }
  .cta-vendor a{ display:inline-block; margin-top:14px; background:var(--red); padding:12px 26px; border-radius:100px; font-weight:600; font-size:0.9rem; }
</style>
</head>
<body>

<header><div class="logo">ETA <span>MARKET</span></div></header>

<div class="hero">
  <h1>Découvre les boutiques ETA MARKET</h1>
  <p>Des vendeurs de tout le Congo, classés selon les avis de vrais clients.</p>
</div>

<div class="wrap">
  <div id="topSection" style="display:none;">
    <div class="section-title">⭐ Les mieux notées <span class="badge-top">Avis clients</span></div>
    <div class="store-grid" id="topGrid"></div>
  </div>

  <div class="section-title">Toutes les boutiques</div>
  <div class="store-grid" id="allGrid">
    <div class="empty">Chargement…</div>
  </div>

  <div class="cta-vendor">
    <h3>Tu veux vendre sur ETA MARKET ?</h3>
    <p style="opacity:0.75; font-size:0.88rem;">Crée ta boutique gratuitement en 2 minutes.</p>
    <a href="dashboard.html">Créer ma boutique →</a>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://reghryppfweynclehwgv.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlZ2hyeXBwZndleW5jbGVod2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NzU5OTEsImV4cCI6MjA5OTE1MTk5MX0.8AjXK3mQeu0JfzaFrj6dENVJOtouldRiMi2ESWA2IzM";

  function storeCard(s, isTop){
    const ratingHtml = s.reviewCount > 0
      ? `<div class="store-rating">${'★'.repeat(Math.round(s.avgRating))}${'☆'.repeat(5-Math.round(s.avgRating))} ${s.avgRating.toFixed(1)} <span class="count">(${s.reviewCount} avis)</span></div>`
      : `<div class="store-rating" style="color:var(--black); opacity:0.4;">Pas encore d'avis</div>`;
    return `
      <a class="store-card ${isTop?'top':''}" href="store.html?s=${s.slug}">
        ${isTop ? '<div class="rank-tag">⭐ Top boutique</div>' : ''}
        <div class="store-top" style="background:${s.accent_color || '#E63946'}"></div>
        <div class="store-body">
          <h3>${s.name}</h3>
          <p>${s.description || 'Boutique en ligne sur ETA MARKET.'}</p>
          ${ratingHtml}
        </div>
      </a>
    `;
  }

  async function init(){
    try {
      const storesRes = await fetch(`${SUPABASE_URL}/rest/v1/dp_stores?is_published=eq.true&order=created_at.desc`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      });
      const stores = await storesRes.json();

      const reviewsRes = await fetch(`${SUPABASE_URL}/rest/v1/dp_reviews?select=store_id,rating`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      });
      const reviews = await reviewsRes.json();

      const withRatings = stores.map(s => {
        const storeReviews = reviews.filter(r => r.store_id === s.id);
        const avgRating = storeReviews.length > 0 ? storeReviews.reduce((sum,r)=>sum+r.rating,0) / storeReviews.length : 0;
        return { ...s, avgRating, reviewCount: storeReviews.length };
      });

      const top = [...withRatings].filter(s => s.reviewCount > 0).sort((a,b) => b.avgRating - a.avgRating || b.reviewCount - a.reviewCount).slice(0, 3);
      const topIds = new Set(top.map(s => s.id));
      const rest = withRatings.filter(s => !topIds.has(s.id));

      if(top.length > 0){
        document.getElementById('topSection').style.display = 'block';
        document.getElementById('topGrid').innerHTML = top.map(s => storeCard(s, true)).join('');
      }

      const allGrid = document.getElementById('allGrid');
      if(withRatings.length === 0){
        allGrid.innerHTML = '<div class="empty">Aucune boutique pour l\'instant. Sois le premier à en créer une !</div>';
        return;
      }
      allGrid.innerHTML = rest.map(s => storeCard(s, false)).join('') || '<div class="empty">Toutes les boutiques sont dans le classement ci-dessus.</div>';
    } catch(err){
      document.getElementById('allGrid').innerHTML = '<div class="empty">Impossible de charger les boutiques.</div>';
    }
  }

  init();
</script>

</body>
</html>
